name: TEST upload

on:
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  checks: write
  actions: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  SQL-Tester:
    runs-on: self-hosted
    name: SQL-Tester
    env:
      PR_NUMBER: ${{ github.event.number }}
    steps:
      - run: |
          pwd
          ls
      - name: Clean Workspace
        uses: AutoModality/action-clean@v1.1.0

      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: BRANCH INFO
        id: branch
        run: |
          echo ${{github.base_ref}}
          echo "branch=${{github.base_ref}}" >> $GITHUB_OUTPUT

      - name: Checkout PR
        run: |
          BRANCH=${{steps.branch.outputs.branch}}
          git checkout $BRANCH;
          git pull;
          BRANCH_NAME="${BRANCH}-${PR_NUMBER}";
          git fetch origin pull/${PR_NUMBER}/head:${BRANCH_NAME};
          git checkout $BRANCH_NAME;
          git checkout -b merge_pr;
          git merge --squash --no-edit ${BRANCH} || (echo "Merge conflict, please check." && exit -1);

      - name: Run Case

        run: |
          cd ${{ github.workspace }}
          rm -rf ./elastic-service
          ln -s /var/lib/elastic-service ./elastic-service
          cd elastic-service && git pull
          cd ${{ github.workspace }}/test
          cp /var/local/env/nosetests.xml .

#          ./bin/run-sql-tester.sh
#          TODO: output echo "FE: ${{needs.deploy.outputs.fe}}, BE: ${{needs.deploy.outputs.be}}"
      - run: |
          set -x
          echo ${GITHUB_EVENT_PATH}
          cat ${GITHUB_EVENT_PATH}

      - name: UT Reports
        if: success() || failure()
        uses: EnricoMi/publish-unit-test-result-action@v2.6.1
        with:
          files: test/*.xml
          event_file: /home/runner/_work/_temp/_github_workflow/event.json
#          files: |
#            test/*.xml
#          junit_files: "test/*.xml"
#          report_suite_logs: "any"
