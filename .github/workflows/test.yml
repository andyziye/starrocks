name: TEST upload

on:
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  checks: write
  actions: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  job1:
    runs-on: self-hosted
    name: job1
    steps:
      - run: echo 1 > 1.txt
      - run: echo 2 >> 1.txt
      - uses: actions/upload-artifact@v3
        with:
          name: TEST FILE
          path: ./1.txt
          retention-days: 1
          
  job2:
    runs-on: self-hosted
    steps:
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        uses: actions/checkout@v3
        with:
          persist-credentials: false
          submodules: recursive
          
      - name: test
        runs: echo A
