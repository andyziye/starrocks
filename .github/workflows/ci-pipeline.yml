      - name: copy cov
        run: |
          cd ${{ github.workspace }}/fe/fe-core
          cp -rf /var/local/env/eci-t4n5cemddizibjpl3hrf_fe_ut_cov_dir/ target/

      - name: Patch Coverage
        run: |
          set -ex
          rm -rf ./coverchecker
          ln -s /var/local/env/coverchecker ./coverchecker
          cd ${{ github.workspace }}/coverchecker
          time_count=0
          pull_status=1
          export JAVA_HOME=/var/local/env/jdk1.8.0_202;
          export PATH=$JAVA_HOME/bin:$PATH;
          while (( $pull_status != 0 ));do
            if (( $time_count == 3 ));then
              exit 1
            fi
            timeout 180 java -jar cover-checker-console/target/cover-checker-console-1.4.0-jar-with-dependencies.jar \
              --cover ${{ github.workspace }}/fe/fe-core/target/result/ --github-token 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 \
              --repo ${{ github.repository }} --threshold 80 --github-url api.github.com --pr ${PR_NUMBER} -type jacoco
            pull_status=$?
            time_count=`expr $time_count + 1`
          done

      - name: Patch Coverage Report
        uses: mikepenz/action-junit-report@v3
        with:
          check_name: 'FE Patch Coverage Report'
          detailed_summary: true
          token: ${{ secrets.GITHUB_TOKEN }}
          report_paths: ${{ github.workspace }}/fe/fe-core/target/surefire-reports/*.xml

      - name: UT Report
        if: always()
        uses: mikepenz/action-junit-report@v3
        with:
          check_name: 'FE UT Report'
          detailed_summary: true
          token: ${{ secrets.GITHUB_TOKEN }}
          report_paths: ${{ steps.run_ut.outputs.FE_REPORT_DIR }}/*.xml

      - name: Clean ECI
        if: always()
        run: |
          echo ${{ steps.run_ut.outputs.ECI_ID }}
          eci rm ${{ steps.run_ut.outputs.ECI_ID }}

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: FE UT LOG
          path: ${{ steps.run_ut.outputs.RES_LOG }}
          retention-days: 1

      - name: Clean ENV
        if: always()
        run: |
          rm -rf ${{ steps.run_ut.outputs.FE_REPORT_DIR }}
          rm -f ${{ steps.run_ut.outputs.RES_FILE }}
          rm -f ${{ steps.run_ut.outputs.RES_LOG }}
