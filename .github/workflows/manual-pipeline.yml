name: MANUAL PIPELINE

on:
  workflow_dispatch:
    inputs:
      IS_REBUILD:
        description: 'REBUILD'
        type: 'boolean'
        default: false

permissions:
  checks: write
  actions: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:

  a:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    continue-on-error: true
    name: A
    env:
      BRANCH: 'main'
    strategy:
      fail-fast: false
      matrix:
        build_type: [ Release, ASAN ]
    steps:
      - name: Matrix
        id: matrix_step
        shell: bash
        env:
          build_type: ${{ matrix.build_type }}
        run: |
          echo ${build_type}
          echo "##### Package: ${build_type}" >> $GITHUB_STEP_SUMMARY

          if [[ "${build_type}" == "ASAN" ]]; then
            exit 1
          fi

      - name: save result
        id: output
        if: always()
        run: |
          set -x
          mkdir output
          echo "${{steps.matrix_step.outcome}}" > ./output/${{ matrix.build_type }}.txt

      - uses: actions/upload-artifact@v4
        if: always() && steps.output.outcome == 'success'
        with:
          name: BE-UT-RESULT-${{ matrix.build_type }}
          path: ./output/${{ matrix.build_type }}.txt

  Teardown:
    runs-on: ubuntu-latest
    name: Teardown
    needs: [ a ]
    steps:
      - run: |
          echo teardown

      - name: Load outputs
        uses: actions/download-artifact@v4
        with:
          pattern: BE-UT-RESULT-ass*
          path: outputs

      - run: |
          ls outputs
          ls outputs/BE-UT-RESULT-ASAN
          cat outputs/BE-UT-RESULT-ASAN/*.txt
          cat outputs/BE-UT-RESULT-Release/*.txt

  HAHA:
    if: inputs.IS_REBUILD == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: test
        run: echo haha