name: MANUAL PIPELINE

on:
  workflow_dispatch:

permissions:
  checks: write
  actions: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:

  be-ut:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    name: BE UT
    continue-on-error: true
    env:
      BRANCH: 'main'
    strategy:
      fail-fast: false
      matrix:
        build_type: [ Release, ASAN ]
    outputs:
      ASAN: ${{ steps.output.outputs.ASAN }}
      Release: ${{ steps.output.outputs.Release }}
    steps:
      - name: Matrix
        id: matrix_step
        shell: bash
        env:
          build_type: ${{ matrix.build_type }}
        run: |
          echo ${build_type}
          if [[ "${build_type}" == "ASAN" ]]; then
            exit 1
          fi

      - name: save result
        id: output
        if: always()
        run:
          set -x
          mkdir -p outputs
          echo "${{steps.matrix_step.outcome}}" > outputs/${{ matrix.build_type }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: outputs/*.txt

  Teardown:
    runs-on: ubuntu-latest
    name: Teardown
    needs: [ be-ut ]
    steps:
      - name: Load outputs
        uses: actions/download-artifact@v4
        with:
          name: outputs
          path: outputs

      - run: |
          ls outputs
          cat outputs/*.txt
