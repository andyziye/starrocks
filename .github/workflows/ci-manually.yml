name: MANUALLY PIPELINE

on:
  issue_comment:
    types:
      - created
      - edited

    branches:
      - 'branch*'
      - thirdparty_branch

  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'

concurrency:
  group: ${{ github.event.number }}-MANUALLY
  cancel-in-progress: true

permissions:
  checks: write
  actions: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  regression:
    runs-on: self-hosted
    if: github.event.issue.pull_request && github.event.comment.body =~ "run regression"
    steps:
      - name: COMMIT INFO
        id: info
        run: |
          set -x
          sha=`curl -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} 2>/dev/null \
            | jq .head.sha`
          sha=$(echo ${sha//\"})
          echo "sha=${sha}" >> $GITHUB_OUTPUT
          
          ref=`curl -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} 2>/dev/null \
            | jq .base.ref`
          ref=$(echo ${ref//\"})
          echo "ref=${ref}" >> $GITHUB_OUTPUT

      - name: Check TAR
        run: |
          set -ex
          echo $NUMBER
          SHA=${SHA::7}
          cd /var/local/env
          build_output_tar=oss://starrocks-ci-release/${BRANCH}/Release/pr/starrocks-${SHA}.tar.gz
          ./ossutil64 --config-file .ossutilconfig ls ${build_output_tar}  | grep tar.gz | head -n 1 \
            || (echo "Empty tar file, please wait for the build job to be success.." && exit -1)
        env:
          NUMBER: ${{ github.event.issue.number }}
          SHA: ${{ steps.info.outputs.sha }}
          BRANCH: ${{ steps.info.outputs.ref }}

      - name: Deploy SR
        run: |
          echo ${NUMBER}
