  fe-checker:
    runs-on: ubuntu-latest
    name: FE FILTER
    if: github.event.action != 'reopened' || github.event.action != 'synchronize'
    outputs:
      output1: ${{ steps.fe-changes-info.outputs.fe }}
    steps:
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            fe:
            - 'fe/**.java'
            - 'fe/**.xml'
      - name: FE CHECK INFO
        id: fe-changes-info
        run: |
          echo "fe=${{ steps.changes.outputs.fe }}" >> $GITHUB_OUTPUT

  fe-codestyle-check:
    runs-on: ubuntu-latest
    needs: fe-checker
    if: ${{ needs.fe-checker.outputs.output1 == 'true' }}
    steps:
      - uses: dorny/paths-filter@v2
        id: java-file
        name: JAVA FILE
        with:
          filters: |
            java:
            - 'fe/**.java'
      - name: "Checkout ${{ github.ref }} ( ${{ github.sha }} )"
        if: ${{ steps.java-file.outputs.java == 'true' }}
        uses: actions/checkout@v3
        with:
          persist-credentials: false
          submodules: recursive

      - name: Copy checkstyle files
        run: cp fe/checkstyle* .

      - name: Run java checkstyle
        uses: dbelyaev/action-checkstyle@v0.6.1
        with:
          workdir: "./fe"
          checkstyle_config: checkstyle.xml
          reporter: 'github-pr-check'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_error: true
          level: error

