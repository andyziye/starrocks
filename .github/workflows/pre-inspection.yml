name: PRE INSPECTION

on:
  # TODO 删除替换
  pull_request:
#  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

    paths:
      - 'docs/**'
      - 'be/**'
      - 'fe/**.java'
      - 'fe/**.xml'

jobs:
  doc-checker:
    runs-on: ubuntu-latest
    name: DOC FILTER
    if: github.event.action != 'reopened' || github.event.action != 'synchronize'
    outputs:
      output1: ${{ steps.doc-changes-info.outputs.doc }}
    steps:
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            doc:
            - 'docs/**'
      - name: DOC CHECK INFO
        id: doc-changes-info
        run: |
          echo "doc=${{ steps.changes.outputs.doc }}" >> $GITHUB_OUTPUT

  add-doc-label:
    needs: doc-checker
    runs-on: ubuntu-latest
    name: ADD DOC LABEL
    if: ${{ needs.doc-checker.outputs.output1 == 'true' }}
    steps:
      - name: add document label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          labels: documentation

  markdownlint:
    runs-on: ubuntu-latest
    needs: add-doc-label
    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: articulate/actions-markdownlint@v1.1.0
        with:
          config: "docs/.markdownlint.yaml"
          files: 'docs/**/*.md'
          ignore: node_modules
          version: 0.28.1

  be-checker:
    runs-on: ubuntu-latest
    name: BE FILTER
    if: github.event.action != 'reopened' || github.event.action != 'synchronize'
    outputs:
      output1: ${{ steps.be-changes-info.outputs.be }}
    steps:
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            be:
            - 'be/**'
      - name: BE CHECK INFO
        id: be-changes-info
        run: |
          echo "be=${{ steps.changes.outputs.be }}" >> $GITHUB_OUTPUT

  clang-format:
    runs-on: self-hosted
    needs: be-checker
    if: ${{ needs.be-checker.outputs.output1 == 'true' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - run: |
          pwd
      - name: Run Clang-Format
        run: |
          export PATH=/var/lib/llvm/bin:$PATH
#          bash build-support/check-format.sh

  tscancode:
    runs-on: ubuntu-latest
    needs: be-checker
    if: ${{ needs.doc-checker.outputs.output1 == 'true' }}
    steps:
