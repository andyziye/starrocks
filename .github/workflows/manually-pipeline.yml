name: MANUALLY PIPELINE

on:
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: Step 1
        run: echo "Job 1 succeeded"

  job2:
    runs-on: ubuntu-latest
    needs: job1
    if: always()
    steps:
      - name: Step 2
        run: echo "Job 2 runs after Job 1"

  job3:
    runs-on: ubuntu-latest
    needs: job2
    steps:
      - name: Check Job 1 outcome
        run: |
          echo ${{ needs.job2.needs.job1.status }}
          echo ${{ needs.job2.needs.job1.outcome }}
          if [ "${{ job.job1.outcome }}" == "success" ]; then
            echo "Job 1 succeeded before Job 3"
          else
            echo "Job 1 did not succeed before Job 3"
            exit 1
          fi
      - name: Step 3
        run: echo "Continue with Job 3"