name: MANUALLY PIPELINE

on:
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest
    outputs:
      job1-result: ${{ steps.step1.outputs.result }} # Define an output variable

    steps:
      - name: Step 1
        id: step1
        run: |
          echo "result=success" >> $GITHUB_OUTPUT

  job2:
    runs-on: ubuntu-latest
    needs: job1

    steps:
      - name: Step 2
        run: echo "Job 2 runs after Job 1"

      - name: Set Job 1 Result
        run: echo "Job 1 result is ${{ needs.job1.outputs.job1-result }}"

  job3:
    runs-on: ubuntu-latest
    needs: job2

    steps:
      - name: Step 3
        run: echo "Job 3 runs after Job 2"

      - name: Set Job 1 Result
        run: echo "Job 1 result is ${{ needs.job1.outputs.job1-result }}"