      output1: ${{ steps.test01.outputs.test01 }}
    steps:
      - name: TEST INFO
        id: test01
        timeout-minutes: 60
        run: |
          echo ${{github.event.action}}
          echo "test01=hello01" >> $GITHUB_OUTPUT

      - name: Add coverage to PR
        id: jacocoo
        uses: madrapps/jacoco-report@v1.3
        with:
          paths: /var/local/env/test/result/jacoco-sessions.html
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 0
          min-coverage-changed-files: 0

