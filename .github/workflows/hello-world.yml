name: Test WorkFlow

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
      - pipeline
      - target
  push:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
      - pipeline
      - target

jobs:

  test:
    runs-on: self-hosted
    steps:
      - name: test
        run: |
          pwd

  fe_ut:
    needs: test
    runs-on: self-hosted
    env:
      PR_NUMBER: ${{ github.event.number }}
    steps:
      - name: ECI TOOLS INIT
        run: |
          rm -rf elastic-service
          git clone git@github.com:AndyZiYe/elastic-service.git
          pwd
          mkdir -p elastic-service/src/starrocks
          echo $GITHUB_WORKSPACE

      - name: REPO
        uses: actions/checkout@v3
        with:
          path: elastic-service/src/starrocks

      - name: fe ut
        run: |
          pwd
          ls
          echo "PR: ${PR_NUMBER}"
          echo "commit-id: ${{ github.sha }}"
          eci ps
