name: Test WorkFlowss

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
      - pipeline
      - target
  push:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
      - pipeline
      - target

jobs:

  TEST:
    runs-on:  ubuntu-latest
    outputs:
      output1: ${{ steps.test01.outputs.test01 }}
    steps:
      - name: TEST INFO
        id: test01
        run: |
          echo ${{github.event.action}}
          echo "test01=hello01" >> $GITHUB_OUTPUT

  TEST2:
    runs-on: ubuntu-latest
    needs: TEST
    outputs:
      output1: ${{ steps.test02.outputs.test02 }}
    steps:
      - name: TEST INFO
        id: test02
        run: |
          echo ${{github.event.action}}
          echo "test02=hello02" >> $GITHUB_OUTPUT

  TEST3:
    runs-on: ubuntu-latest
    needs: TEST
    outputs:
      output1: ${{ steps.test03.outputs.test03 }}
    steps:
      - name: TEST INFO
        id: test03
        run: |
          echo "test03=hello03" >> $GITHUB_OUTPUT 

  TEST4:
    runs-on: ubuntu-latest
    needs: [TEST2, TEST3]
    steps:
      - name: TEST INFO
        id: test03
        run: |
          echo ${{ needs.TEST2.outputs.output1 }}
          echo ${{ needs.TEST.outputs.output1 }}