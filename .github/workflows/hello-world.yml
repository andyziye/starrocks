name: Test WorkFlow

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
      - pipeline
      - target
  push:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main
      - pipeline
      - target

jobs:
  #  specific_merge_requested:
  #    runs-on: ubuntu-latest
  #    if: ${{ github.event.pull_request.merged == true}}
  #    steps:
  #      - run: echo 'Merged job'
  info:
    runs-on: ubuntu-latest
    steps:
      - name: INFO
        run: |
          echo -e  "branch:  ${{ github.head_ref }}\ncommit-id: ${{ github.sha }}\nPR: ${{ github.base_ref }}\n${{ github.run_number }} \n${{ github.run_id }}"

  fe_ut:
    runs-on: self-hosted
    env:
      PR_NUMBER: ${{ github.event.number }}
    steps:
      - name: fe ut
        run: |
          pwd;
          echo ${PR_NUMBER}
