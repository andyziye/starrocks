name: rerun

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

  issue_comment:
    types: [ created ]

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - uses: khan/pull-request-comment-trigger@v1.1.0
        id: check
        with:
          trigger: '@deploy'
          reaction: rocket
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
      - run: |
          echo ${{ steps.check.outputs.triggered }}
          echo ${{ steps.check.outputs.comment_body }}
      - name: Rerun
        if: |
          [[ ${{ steps.check.outputs.triggered }} == 'true' ]] && \
          [[ `echo ${{ steps.check.outputs.comment_body }}` == 'rerun' ]]
        run: |
          set -x
          curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/AndyZiYe/starrocks/actions/runs/4466209139/rerun-failed-jobs


