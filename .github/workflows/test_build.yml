name: TEST Cron

on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: '0/2 * * * *'

permissions:
  checks: write
  actions: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

jobs:
  Cron-Build:
    runs-on: self-hosted
    name: Cron Build
    env:
      PR_NUMBER: ${{ github.event.number }}
    steps:
      - run: |
          set -x
          echo ${GITHUB_OUTPUT}
          cat ${GITHUB_OUTPUT}
      - name: Clean Workspace
        uses: AutoModality/action-clean@v1.1.0

      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: BRANCH INFO
        id: branch
        run: |
          echo ${{github.base_ref}}
          echo "branch=${{github.base_ref}}" >> $GITHUB_OUTPUT

      - name: Checkout PR
        run: |
          BRANCH=${{steps.branch.outputs.branch}}
          git checkout $BRANCH;
          git pull;

      - name: Build
        run: |
          cd ${{ github.workspace }}
          rm -rf ./elastic-service
          ln -s /var/lib/elastic-service ./elastic-service
          cd elastic-service && git pull
          
