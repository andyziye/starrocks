name: hello

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
concurrency:
  group: ${{ github.event.number }}
  cancel-in-progress: true

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - run: echo ${{ github.event.number }}
      - run: echo a
      - run: echo b

  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - run: sleep 301

