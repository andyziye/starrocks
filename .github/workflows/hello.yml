name: hello

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
concurrency:
  group: ${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - run: echo ${{ github.head_ref }}
      - run: echo a
      - run: echo b

  job2:
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - run: sleep 302

