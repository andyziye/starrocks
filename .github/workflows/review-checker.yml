name: review checker

permissions:
  # All other permissions are set to none
  checks: write
  contents: read
  pull-requests: write

on: pull_request_review

jobs:
  reviewer-count-check:
    runs-on: ubuntu-latest
    steps:
      - uses: taichi/approved-event-action@v1.2.1
        id: approved
        with:
          approvals: '2'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'

      - name: create-file
        if: steps.approved.outputs.approved == 'true'
        run: echo '${{ steps.approved.outputs.approved }}' >> ${{ github.workspace }}/${{ github.event.pull_request.number }}

      - run: echo 'false' >> ${{ github.workspace }}/${{ github.event.pull_request.number }}
        if: steps.approved.outputs.approved != 'true'

      - uses: actions/upload-artifact@v3
        with:
          name: review
          path: ${{ github.workspace }}/${{ github.event.pull_request.number }}
          retention-days: 2

  add-approve-label:
    runs-on: ubuntu-latest
    needs: reviewer-count-checker
    steps:
      - name: "Get information about the original trigger of the run"
        uses: potiuk/get-workflow-origin@v1_2
        id: source-run-info
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sourceRunId: ${{ github.event.workflow_run.id }}

      - run: sleep 10 # wait the pr review upload artifact finished

      - uses: dawidd6/action-download-artifact@v2
        with:
          workflow: review-checker.yml
          run_id: ${{ github.event.workflow_run.id }}
          path: ${{ github.workspace }}
      #           pr: ${{ steps.source-run-info.outputs.pullRequestNumber }} # pr number, commit, run_id, branch cannot use together

      - name: Read Properties
        id: read_property
        run: echo "result=$(cat review/${{ steps.source-run-info.outputs.pullRequestNumber }})" >> $GITHUB_OUTPUT

      - name: Label when approved by 2 committers
        if: steps.read_property.outputs.result == 'true'
        uses: actions-ecosystem/action-add-labels@v1
        with:
          github_token: ${{ secrets.PAT }}
          labels: approved
          number: ${{ steps.source-run-info.outputs.pullRequestNumber }}